<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Weird Eksint Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-container{background:white;padding:3rem;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,0.15);width:100%;max-width:420px;position:relative;overflow:hidden}
        .login-container::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#3b82f6,#2563eb)}
        .login-header{text-align:center;margin-bottom:2rem;position:relative;z-index:2}
        .login-header img{width:60px;height:60px;border-radius:16px;margin-bottom:1rem;object-fit:cover;border:3px solid rgba(59,130,246,0.2)}
        .login-header h2{color:#1e293b;font-weight:800;margin-bottom:0.5rem;font-size:1.8rem}
        .login-header p{color:#64748b;font-size:0.95rem}
        .form-group{margin-bottom:1.5rem;position:relative}
        .form-group input{width:100%;padding:1.2rem 1.2rem 1.2rem 3rem;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem;font-family:'Courier New',monospace;transition:all 0.3s ease;background:rgba(255,255,255,0.8);backdrop-filter:blur(10px)}
        .form-group input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.1);background:white;transform:translateY(-2px)}
        .form-group input::placeholder{color:#94a3b8}
        .input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#64748b;font-size:1.1rem}
        .login-btn{width:100%;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;border:none;padding:1.2rem;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(59,130,246,0.4)}
        .login-btn:hover:not(:disabled){transform:translateY(-4px);box-shadow:0 20px 40px rgba(59,130,246,0.5)}
        .login-btn:disabled{opacity:0.7;cursor:not-allowed!important;transform:none!important;background:#94a3b8!important;box-shadow:none!important}
        .error{color:#ef4444;font-size:0.9rem;margin-top:0.5rem;text-align:center;padding:1rem;background:rgba(239,68,68,0.1);border-radius:12px;border-left:4px solid #ef4444;display:none;animation:shake 0.5s ease-in-out}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
        .security-badge{position:absolute;bottom:1rem;right:1rem;background:rgba(59,130,246,0.1);padding:0.3rem 0.8rem;border-radius:20px;font-size:0.75rem;color:#3b82f6;font-weight:600}
        @media (max-width:480px){.login-container{padding:2rem 1.5rem;margin:1rem}}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="assets/images/logo.jpeg" alt="Logo" onerror='this.src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMzAiIGN5PSIzMCIgcj0iMjgiIGZpbGw9IiMzYjgyZjYiLz4KPHRleHQgeD0iMzAiIHk9IjM2IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iUG9wcGlucywgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNCIgZmlsbD0id2hpdGUiPldFUzwvdGV4dD4KPC9zdmc+"'>
            <h2>Admin Panel</h2>
            <p>Weird Eksint Studio 🔐</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="username" placeholder="Username" required autocomplete="username">
            </div>
            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Masuk ke Dashboard
            </button>
        </form>
        
        <div id="errorMsg" class="error"></div>
        <div class="security-badge">AES-256 Encrypted</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
    const ENCRYPTED_PASSWORD = 'U2FsdGVkX1+2/opvMpRmkh1dKWBQml610zjBWWWIZlM=';
    const ENCRYPTION_KEY = 'WeirdEksintStudio2024!SecureKey#v3';
    const ADMIN_USERNAME = 'admin';
    
    
    
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
        
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        try {
            const decryptedPassword = CryptoJS.AES.decrypt(ENCRYPTED_PASSWORD, ENCRYPTION_KEY).toString(CryptoJS.enc.Utf8);
            
            if (username === ADMIN_USERNAME && password === decryptedPassword) {
                // ✅ SESSION ADMIN SAJA (30 menit)
                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_session', Date.now().toString());
                
                // 📨 CEK PESAN KLIEN AMAN
                const messages = JSON.parse(localStorage.getItem('adminMessages') || '[]');
                console.log('✅ Login OK - Pesan klien:', messages.length, 'pesan AMAN');
                
                // Success screen
                document.body.innerHTML = `
                    <div style="text-align:center;padding:4rem;font-family:Poppins;background:linear-gradient(135deg,#10b981,#059669);color:white;border-radius:24px;box-shadow:0 30px 80px rgba(16,185,129,0.4);max-width:400px;margin:2rem auto">
                        <div style="font-size:5rem;margin-bottom:1rem">✅</div>
                        <h2 style="font-size:2.5rem;font-weight:800">Login Berhasil!</h2>
                        <p style="font-size:1.2rem;margin-bottom:2rem">Pesan klien aman (${messages.length} pesan)</p>
                        <div style="background:rgba(255,255,255,0.2);padding:1rem;border-radius:12px;font-weight:600">Redirecting...</div>
                    </div>
                `;
                setTimeout(() => window.location.href = 'admin.html', 2000);
                
            } else {
                errorMsg.innerHTML = '❌ Username: <strong>admin</strong><br>Password salah!';
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.innerHTML = '❌ ' + err.message;
            errorMsg.style.display = 'block';
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk ke Dashboard';
        }
    });
</script>
</body>
</html>
